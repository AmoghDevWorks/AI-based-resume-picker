# AI tools declaration
# ============================================================================
ai_tools_used:
  - "ChatGPT"         # Project planning, feature brainstorming, and task breakdown
  - "Claude"          # Architecture discussion, code review, and honeypot signal design
  - "GitHub Copilot"  # Autocomplete during development

ai_usage_summary: |
  ChatGPT was used during the planning phase — brainstorming the overall project
  structure (client/server split), breaking down tasks across team members,
  drafting the scoring component checklist, and deciding on the honeypot signal
  categories before any code was written.

  Claude was used for architecture discussion, reviewing the scoring pipeline
  design, iterating on the HoneypotFilter signal logic, and code review of the
  ranking engine.

  GitHub Copilot was used for autocomplete and boilerplate during active
  development of both the FastAPI backend (server/) and the frontend (client/).

  No candidate data or job description text was fed to any external LLM at any
  point. All ranking and scoring logic runs fully offline using scikit-learn,
  pandas, and numpy.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Multi-signal, weighted scoring pipeline with an upstream honeypot filter.

  Scoring has four components combined into a weighted final score (weights
  sum to 100): TF-IDF cosine similarity between the JD and a structured resume
  text (45%), skill-match with proficiency-weighted partial credit (25%),
  platform/behavioral signals — profile completeness, GitHub activity, skill
  assessments, recruiter responsiveness, recency (25%), and experience-curve
  scoring against a configurable min/ideal/max target (5%). A notice-period
  bonus/penalty of ±3–5 points is applied post-aggregation.

  Before TF-IDF is computed, a 15-signal HoneypotFilter removes fraudulent
  profiles outright (any single trigger = removal). Signals cover impossible
  tenures at known young companies, timeline drift, skill inflation, zero-years
  expert claims, overlapping/duplicate job entries, future dates, suspiciously
  perfect paper profiles, excessive job hopping, unrealistic promotion velocity,
  impossible skill chronology, education-employment inconsistency, simultaneous
  full-time jobs, keyword stuffing, and activity contradiction.

  The pipeline runs end-to-end on CPU in well under 5 minutes for typical
  candidate pools, with no network access required at runtime.

